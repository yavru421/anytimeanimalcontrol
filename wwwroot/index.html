<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Anytime Animal Control</title>
    <base href="/" />
    
    <!-- Apple PWA Standalone Mode Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="icon-192.png" />
    <link href="AnytimeAnimalControl.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    
    <!-- PDF & Estimate Generation -->
    <script src="js/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="js/estimateInterop.js"></script>
    
    <!-- JS Interops -->
    <script src="js/iosPwaInterop.js"></script>
    
    <script type="importmap"></script>
</head>
<body>
    <div id="app">
        <div class="shotstack-loader">
            <div class="spinner"></div>
            <span class="loading-text">Mounting AAC Tool...</span>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" style="width: var(--blazor-load-percentage, 0%)"></div>
            </div>
            <style>
                .progress-text::after {
                    content: var(--blazor-load-percentage-text, "0") "%";
                }
            </style>
            <span class="progress-text">Loading... </span>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled exception occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">✕</a>
    </div>

    <!-- Premium Universal A2HS Banner -->
    <div id="smart-install-banner" style="display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(45, 45, 45, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: white; padding: 20px; box-sizing: border-box; z-index: 10000; border-top: 2px solid #FF5F15; box-shadow: 0 -5px 25px rgba(0,0,0,0.5); font-family: 'Inter', system-ui, sans-serif; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); transform: translateY(100%);">
        <div style="display: flex; align-items: center; justify-content: space-between; max-width: 600px; margin: 0 auto; gap: 15px;">
            <div style="flex-shrink: 0; width: 50px; height: 50px; background: #FF5F15; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px;">🐾</div>
            <div style="flex-grow: 1;">
                <h3 style="margin: 0 0 4px 0; color: #FFF; font-size: 1.1rem; font-weight: 800; letter-spacing: 0.5px;">Install App</h3>
                <p id="install-instructions" style="margin: 0; font-size: 0.9rem; color: #CCC; line-height: 1.4;">Add to home screen for quick access.</p>
            </div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <button id="btn-install" style="background: #FF5F15; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 800; font-family: 'Inter', sans-serif; cursor: pointer; display: none;">INSTALL</button>
                <button onclick="dismissInstallBanner()" style="background: transparent; color: #888; border: 1px solid #555; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;">Not Now</button>
            </div>
        </div>
    </div>
    
    <script>
        const installBanner = document.getElementById('smart-install-banner');
        const installBtn = document.getElementById('btn-install');
        const installInstructions = document.getElementById('install-instructions');
        let deferredPrompt;

        // Hide banner smoothly and save preference
        window.dismissInstallBanner = function() {
            installBanner.style.transform = 'translateY(100%)';
            setTimeout(() => { installBanner.style.display = 'none'; }, 400);
            localStorage.setItem('pwa-prompt-dismissed', 'true');
        };

        const showBanner = () => {
            if (localStorage.getItem('pwa-prompt-dismissed') === 'true') return;
            installBanner.style.display = 'block';
            // Slight delay to trigger CSS transition
            setTimeout(() => { installBanner.style.transform = 'translateY(0)'; }, 50);
        };

        // 1. Android / Chrome Logic
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
            installInstructions.innerText = "Install Anytime Animal Control to your device for fast access.";
            showBanner();
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    dismissInstallBanner();
                }
                deferredPrompt = null;
            }
        });

        // 2. iOS Safari Logic
        const isIos = () => {
            const userAgent = window.navigator.userAgent.toLowerCase();
            return /iphone|ipad|ipod/.test(userAgent);
        };
        const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

        // If it's iOS and not already installed, show manual instructions
        if (isIos() && !isInStandaloneMode()) {
            installInstructions.innerHTML = `Tap <span style="font-size: 1.2rem;">⍗</span> below and select <strong>Add to Home Screen</strong>.`;
            showBanner();
        }
    </script>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        // Request persistent storage defensively for iOS 7-day eviction
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(granted => {
                if (granted) console.log("Storage will not be cleared except by explicit user action");
                else console.log("Storage may be cleared by the UA under storage pressure.");
            });
        }

        navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' }).then(registration => {
            registration.onupdatefound = () => {
                const installingWorker = registration.installing;
                if (installingWorker == null) {
                    return;
                }
                installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                        if (navigator.serviceWorker.controller) {
                            // A new service worker has been installed and is ready to take over.
                            console.log('New or updated content is available. Please refresh the page to update.');
                        }
                    }
                };
            };
        });
    </script>
    <script src="js/editorInteractions.js"></script>
    
    <script>
        // High-speed blob transmission stream bypass framework
        window.shotStackSaver = {
            saveAndDownloadFile: function (filename, byteBase64) {
                try {
                    // Convert base64 to byte array
                    const byteCharacters = atob(byteBase64);
                    const byteNumbers = new Array(byteCharacters.length);
                    for (let i = 0; i < byteCharacters.length; i++) {
                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                    }
                    const byteArray = new Uint8Array(byteNumbers);
                    
                    // Create File object for sharing
                    const file = new File([byteArray], filename, { type: 'application/pdf' });
                    
                    // Track PDF generation securely via first-party Cloudflare Worker
                    try {
                        navigator.sendBeacon('/api/track-pdf');
                    } catch (e) {
                        console.error('Failed to send PDF generation beacon', e);
                    }
                    
                    // Use Web Share API if supported (critical for mobile PWA standalone mode)
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({
                            files: [file],
                            title: 'ShotStack Studio PDF',
                            text: 'Your compiled PDF document is ready.'
                        }).catch(err => {
                            console.log('User canceled or share failed, falling back to download:', err);
                            window.shotStackSaver.triggerFallbackDownload(filename, byteArray);
                        });
                    } else {
                        window.shotStackSaver.triggerFallbackDownload(filename, byteArray);
                    }
                } catch (error) {
                    console.error('File saving failed:', error);
                }
            },
            triggerFallbackDownload: function (filename, byteArray) {
                const blob = new Blob([byteArray], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.download = filename;
                link.href = url;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                setTimeout(() => URL.revokeObjectURL(url), 2000);
            }
        };
    </script>
</body>
</html>
